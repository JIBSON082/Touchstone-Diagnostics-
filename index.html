<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Touchstone Diagnostics | 24/7 Medical Lab & Imaging Surulere</title>

  <meta name="description" content="Touchstone Diagnostics in Surulere, Lagos: 24/7 laboratory, X-ray, ultrasound, fertility screening. Where precision meets compassion – reliable, fast, and affordable diagnostic results.">
  <meta name="keywords" content="diagnostic center Surulere, 24 hour medical lab Lagos, ultrasound scan, fertility screening, where precision meets compassion">

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* ================= EXISTING STYLES (UNCHANGED) ================= */
    /* ... YOUR ENTIRE ORIGINAL CSS REMAINS HERE ... */

    /* ================================================================
       ADDED: Smooth scroll offset for fixed header
    ================================================================= */
    section {
      scroll-margin-top: 90px; /* header height + spacing */
    }

    /* ================================================================
       ADDED: Hover lift & shadow animations
    ================================================================= */
    .service-card,
    .feature-item,
    .about-image,
    .hero-image {
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .service-card:hover,
    .feature-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 35px -15px rgba(0, 33, 71, 0.35);
    }

    .about-image:hover,
    .hero-image:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 50px -25px rgba(0, 33, 71, 0.45);
    }

    /* ================================================================
       ADDED: Scroll reveal animation
    ================================================================= */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body x-data="{ mobileMenu: false }">

  <!-- ================= EXISTING HTML (UNCHANGED) ================= -->

  <!-- ADD reveal class ONLY (structure unchanged) -->
  <section id="home" class="hero reveal">...</section>
  <section id="about" class="section reveal">...</section>
  <section id="services" class="section reveal">...</section>
  <section class="features section reveal">...</section>
  <section id="contact" class="section reveal">...</section>

  <!-- ================= ADDED: Smooth scroll + reveal JS ================= -->
  <script>
    /* Smooth scroll with offset (fallback for older browsers) */
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        const target = document.querySelector(this.getAttribute('href'));
        if (!target) return;

        e.preventDefault();
        const headerOffset = 80;
        const elementPosition = target.getBoundingClientRect().top;
        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

        window.scrollTo({
          top: offsetPosition,
          behavior: "smooth"
        });
      });
    });

    /* Scroll reveal animation */
    const reveals = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.15 }
    );

    reveals.forEach(el => observer.observe(el));
  </script>

</body>
</html>
